<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Люберецкий Техникум</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Люберецкий Техникум</h1>
    </header>
    <div class="container">
        
        <h2>О техникуме</h2>
        <p>Люберецкий техникум предлагает качественное образование и подготовку специалистов в различных областях. Наши программы обучения адаптированы к современным требованиям рынка труда.</p>
        
        <h2>Заказать справку об обучении</h2>
        <div class="order-form">
            <form action="#" method="post">
                <label for="name">Имя:</label>
                <input type="text" id="name" name="name" required>
                
                <label for="email">Электронная почта:</label>
                <input type="email" id="email" name="email" required>
                
                <input type="submit" value="Заказать справку">
            </form>
        </div>
    </div>
</body>
</html>
