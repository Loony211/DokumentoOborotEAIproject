<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Люберецкий Техникум</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
        }
        header {
            background-image: url('min.jpg');
            background-size: cover;
            background-position: center;
            color: #fff;
            padding: 200px 0;
            text-align: left;
        }
        .container {
            padding: 30px;
            max-width: 2000px;
            margin: 0 auto;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color:pink;
            text-align: center;
        }
        h2 {
            color: #333;
        }
        p {
            line-height: 1.6;
        }
        .order-form {
            margin-top: 20px;
            padding: 15px;
            background-color: #e9e9e9;
            border-radius: 5px;
        }
        .order-form label {
            display: block;
            margin-bottom: 5px;
        }
        .order-form input[type="text"],
        .order-form input[type="email"] {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .order-form input[type="submit"] {
            background-color: #333;
            color: #fff;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .order-form input[type="submit"]:hover {
            background-color: #555;
        }
    </style>
</head>
<body>
    <header>
    </header>
    <div class="container">
        <h1>Люберецкий Техникум</h1>
        <h2>О техникуме</h2>
        <p>Люберецкий техникум предлагает качественное образование и подготовку специалистов в различных областях. Наши программы обучения адаптированы к современным требованиям рынка труда.</p>

        <h2>Заказать справку об обучении</h2>
        <div class="order-form">
            <form action="#" method="post">
                <label for="name">Имя:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Электронная почта:</label>
                <input type="email" id="email" name="email" required>

                <input type="submit" value="Заказать справку">
            </form>
        </div>
    </div>
</body>
</html>
